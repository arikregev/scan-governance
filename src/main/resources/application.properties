# ── Datasource ──────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:scandb}

quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

# ── Kafka ────────────────────────────────────────────────────────────────────
mp.messaging.incoming.scan-events.connector=smallrye-kafka
mp.messaging.incoming.scan-events.topic=${KAFKA_SCAN_EVENTS_TOPIC:scan-events}
mp.messaging.incoming.scan-events.group.id=${KAFKA_GROUP_ID:scan-governance}
mp.messaging.incoming.scan-events.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
# Messages are keyed by workflow_id; ordering per key is preserved per partition.
mp.messaging.incoming.scan-events.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.scan-events.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.scan-events.auto.offset.reset=earliest
# Dead-letter topic for poison-pill messages
mp.messaging.incoming.scan-events.dead-letter-queue.topic=${KAFKA_DLQ_TOPIC:scan-events-dlq}
mp.messaging.incoming.scan-events.failure-strategy=dead-letter-queue

# ── Temporal ─────────────────────────────────────────────────────────────────
scan.governance.temporal.host=${TEMPORAL_HOST:localhost:7233}
scan.governance.temporal.namespace=${TEMPORAL_NAMESPACE:default}

# ── Poller ───────────────────────────────────────────────────────────────────
# How often to poll non-terminal workflows for status updates
scan.governance.poller.interval=${POLLER_INTERVAL:30s}
# Max rows processed per poller tick
scan.governance.poller.batch-size=${POLLER_BATCH_SIZE:100}
# Workflows stuck in QUEUED/RUNNING longer than this are marked TIMED_OUT
scan.governance.workflow.timeout-hours=${WORKFLOW_TIMEOUT_HOURS:24}

# ── Logging ──────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.scangovernance".level=DEBUG

# ── Test profile (uses H2 in-memory) ─────────────────────────────────────────
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%test.quarkus.flyway.locations=db/migration
